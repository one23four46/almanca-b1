<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PflegeAkademy Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nurse-blue: #0ea5e9; --med-green: #10b981; --warning-gold: #f59e0b;
            --danger-red: #ef4444; --bg: #f8fafc; --card: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; padding: 10px; position: relative; }

        /* ÜST PANEL - RPG STİLİ */
        .stats-panel { 
            background: #1e293b; color: white; padding: 12px; border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 10px; flex-shrink: 0;
        }
        .stats-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .rank-label { color: var(--nurse-blue); font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .level-badge { background: var(--nurse-blue); padding: 2px 8px; border-radius: 8px; font-size: 12px; font-weight: 900; }
        
        .xp-bar-bg { background: #334155; height: 8px; border-radius: 10px; overflow: hidden; position: relative; }
        #xp-bar-fill { background: var(--med-green); height: 100%; width: 0%; transition: 0.5s; }

        .currency-row { display: flex; gap: 15px; margin-top: 8px; font-size: 14px; font-weight: 700; }
        .coin-val { color: var(--warning-gold); }
        .xp-val { color: #94a3b8; font-size: 12px; }

        /* MARKET GÜNCELLENDİ */
        .market-belt { display: flex; justify-content: space-around; background: white; padding: 8px; border-radius: 18px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
        .item { text-align: center; cursor: pointer; flex: 1; border-right: 1px solid #f1f5f9; }
        .item-price { font-size: 10px; background: #f1f5f9; color: #1e293b; border-radius: 8px; padding: 1px 6px; font-weight: 800; }

        /* SORU KARTI */
        .card { background: var(--card); border-radius: 25px; padding: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); text-align: center; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .vaka-box { background: #f8fafc; border-radius: 15px; padding: 10px; font-size: 12px; color: #475569; border-left: 4px solid var(--nurse-blue); text-align: left; margin-bottom: 10px; font-style: italic; }

        .opt-btn { background: white; border: 2px solid #f1f5f9; border-radius: 15px; padding: 14px; font-weight: 600; text-align: left; cursor: pointer; font-size: 14px; margin-bottom: 6px; width: 100%; transition: 0.2s; }
        .correct { background: var(--med-green) !important; color: white !important; }
        .wrong { background: var(--danger-red) !important; color: white !important; }

        /* ÇARK */
        #wheel-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wheel-container { position: relative; width: 300px; height: 300px; border: 8px solid white; border-radius: 50%; overflow: hidden; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); 
            background: conic-gradient(
                #10b981 0 45deg, #f59e0b 45deg 90deg, #3b82f6 90deg 135deg, #8b5cf6 135deg 180deg,
                #ec4899 180deg 225deg, #ef4444 225deg 270deg, #06b6d4 270deg 315deg, #64748b 315deg 360deg
            );
        }
        .wheel-text { position: absolute; top: 0; right: 0; width: 50%; height: 50%; transform-origin: bottom left; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 10px; padding-bottom: 60px; text-align: center; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: white; padding: 25px; border-radius: 30px; text-align: center; width: 100%; max-width: 320px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="modal-overlay" style="background: white;">
        <div style="text-align: center; width: 100%;">
            <span style="font-size: 60px;">👩‍⚕️</span>
            <h1 style="font-family:'Montserrat'; margin:10px 0; color:var(--nurse-blue);">PflegeAkademy</h1>
            <input type="text" id="user-name" placeholder="Mesleki İsminiz" style="width:80%; padding:15px; border-radius:15px; border:2px solid #ddd; margin-bottom:15px; text-align:center;">
            <button onclick="start()" style="background:var(--nurse-blue); color:white; border:none; padding:15px 40px; border-radius:15px; font-weight:900; cursor:pointer;">KARİYERE BAŞLA</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div class="stats-panel">
            <div class="stats-top">
                <div>
                    <span class="rank-label" id="rank-name">Stajyer</span>
                    <div id="disp-name" style="font-size:16px; font-weight:700;">Nurse Name</div>
                </div>
                <div class="level-badge">LEVEL <span id="lvl-val">1</span></div>
            </div>
            <div class="xp-bar-bg"><div id="xp-bar-fill"></div></div>
            <div class="currency-row">
                <span>💰 <span class="coin-val" id="coin-val">0</span></span>
                <span class="xp-val">XP: <span id="xp-val">0</span> / <span id="next-xp-val">100</span></span>
                <span style="margin-left:auto;">❤️ <span id="life-val">5</span></span>
            </div>
        </div>

        <div class="market-belt">
            <div class="item" onclick="buy('heart', 150)">💉 <br><span class="item-price">150 💰</span></div>
            <div class="item" onclick="buy('skip', 80)">🚑 <br><span class="item-price">80 💰</span></div>
            <div class="item" onclick="buy('hint', 50)">💡 <br><span class="item-price">50 💰</span></div>
        </div>

        <div style="flex-grow:1; display:flex; flex-direction:column;">
            <div class="card">
                <div class="vaka-box" id="vaka-text">Lädt...</div>
                <div id="art-badge" style="background:var(--nurse-blue); color:white; display:inline-block; padding:1px 8px; border-radius:5px; font-size:10px; font-weight:900; margin-bottom:5px;">DIE</div>
                <h2 id="q-word" style="margin:5px 0; font-size:24px; color:#1e293b;">Kelime</h2>
                <button onclick="speak()" style="background:#f1f5f9; border:none; padding:8px 15px; border-radius:10px; color:var(--nurse-blue); font-weight:700; cursor:pointer;">🔊 Aussprache</button>
            </div>
            <div id="opt-grid"></div>
        </div>

        <div id="gift-btn" class="hidden" onclick="openWheel()" style="position:absolute; right:15px; bottom:100px;">
            <div style="background:white; border-radius:15px; padding:10px; border:3px solid var(--warning-gold); animation:bounce 1s infinite;">
                <span style="font-size:30px;">🎁</span>
            </div>
        </div>
    </div>

    <div id="wheel-modal" class="hidden">
        <div class="wheel-container">
            <div id="wheel">
                <div class="wheel-text" style="transform: rotate(22.5deg);">+200 💰</div>
                <div class="wheel-text" style="transform: rotate(67.5deg);">+1 CAN</div>
                <div class="wheel-text" style="transform: rotate(112.5deg);">+50 💰</div>
                <div class="wheel-text" style="transform: rotate(157.5deg);">+100 XP</div>
                <div class="wheel-text" style="transform: rotate(202.5deg);">HEDİYE</div>
                <div class="wheel-text" style="transform: rotate(247.5deg);">+150 💰</div>
                <div class="wheel-text" style="transform: rotate(292.5deg);">+20 XP</div>
                <div class="wheel-text" style="transform: rotate(337.5deg);">BOŞ</div>
            </div>
        </div>
        <button onclick="spin()" id="spin-btn" style="margin-top:30px; padding:15px 60px; border-radius:30px; border:none; background:var(--med-green); color:white; font-weight:900; font-size:20px;">ÇEVİR!</button>
    </div>

    <div id="reward-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div id="rew-icon" style="font-size:60px;">🎉</div>
            <h2 id="rew-title">TEBRİKLER!</h2>
            <p id="rew-desc"></p>
            <button onclick="closeReward()" style="background:var(--nurse-blue); color:white; border:none; padding:15px; border-radius:15px; width:100%; font-weight:900; cursor:pointer;">DEVAM ET</button>
        </div>
    </div>

<script>
    const VOCAB = [
        { de: "Blutentnahme", art: "die", tr: "Kan alma", vaka: "Der Patient benötigt eine Laboruntersuchung." },
        { de: "Hüftgelenk", art: "das", tr: "Kalça eklemi", vaka: "Nach dem Sturz hat der Patient Schmerzen in der Hüfte." },
        { de: "Herzrhythmus", art: "der", tr: "Kalp ritmi", vaka: "Der Puls ist unregelmäßig." },
        { de: "Schilddrüse", art: "die", tr: "Tiroid bezi", vaka: "Die Hormone müssen kontrolliert werden." },
        { de: "Magengeschwür", art: "das", tr: "Mide ülseri", vaka: "Der Patient klagt über starke Bauchschmerzen nach dem Essen." }
    ];

    let state = { xp: 0, coins: 100, lives: 5, level: 1, streak: 0, busy: false };

    const RANKS = ["Stajyer Hemşire", "Yardımcı Hemşire", "Servis Hemşiresi", "Uzman Hemşire", "Başhemşire", "Akademi Üyesi", "Profesör", "Başhekim"];

    function start() {
        state.name = document.getElementById('user-name').value || "Hemşire";
        document.getElementById('disp-name').innerText = state.name;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        updateUI();
        next();
    }

    function getNextXP() { return state.level * state.level * 100; }

    function checkLevelUp() {
        let nextXP = getNextXP();
        if (state.xp >= nextXP) {
            state.level++;
            let reward = state.level * 50;
            state.coins += reward;
            showReward("LEVEL UP!", `Tebrikler Seviye ${state.level} oldun! <br> 💰 ${reward} Med-Coin kazandın.`, "🎊");
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function updateUI() {
        document.getElementById('xp-val').innerText = state.xp;
        document.getElementById('coin-val').innerText = state.coins;
        document.getElementById('lvl-val').innerText = state.level;
        document.getElementById('life-val').innerText = state.lives;
        
        let nextXP = getNextXP();
        document.getElementById('next-xp-val').innerText = nextXP;
        let progress = (state.xp / nextXP) * 100;
        document.getElementById('xp-bar-fill').style.width = progress + "%";

        // Ünvan Belirleme
        let rankIdx = Math.min(Math.floor(state.level / 5), RANKS.length - 1);
        document.getElementById('rank-name').innerText = RANKS[rankIdx];
    }

    function next() {
        state.current = VOCAB[Math.floor(Math.random() * VOCAB.length)];
        document.getElementById('vaka-text').innerText = state.current.vaka;
        document.getElementById('q-word').innerText = state.current.de;
        document.getElementById('art-badge').innerText = state.current.art.toUpperCase();
        
        let opts = [state.current.tr];
        while(opts.length < 4) {
            let r = VOCAB[Math.floor(Math.random() * VOCAB.length)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('opt-grid');
        grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerText = o;
            b.onclick = () => {
                if(o === state.current.tr) {
                    state.xp += 20;
                    state.coins += 5;
                    state.streak++;
                    b.classList.add('correct');
                    if(state.streak >= 4) document.getElementById('gift-btn').classList.remove('hidden');
                    checkLevelUp();
                } else {
                    state.lives--;
                    state.streak = 0;
                    b.classList.add('wrong');
                    if(state.lives <= 0) location.reload();
                }
                updateUI();
                setTimeout(next, 800);
            };
            grid.appendChild(b);
        });
    }

    function openWheel() {
        document.getElementById('gift-btn').classList.add('hidden');
        document.getElementById('wheel-modal').classList.remove('hidden');
        state.streak = 0;
    }

    function spin() {
        if(state.busy) return;
        state.busy = true;
        const wheel = document.getElementById('wheel');
        const deg = Math.floor(Math.random() * 360) + 3600;
        wheel.style.transform = `rotate(${deg}deg)`;

        setTimeout(() => {
            const actual = 360 - (deg % 360);
            let p = {};
            if(actual < 45) p = { t: "200 MED-COIN", d: "Zenginsin! 200 para eklendi.", i: "💰", fn: () => state.coins += 200 };
            else if(actual < 90) p = { t: "EKSTRA CAN", d: "Sağlık durumun iyileşti.", i: "💉", fn: () => state.lives++ };
            else if(actual < 135) p = { t: "50 MED-COIN", d: "Küçük bir prim kazandın.", i: "💰", fn: () => state.coins += 50 };
            else if(actual < 180) p = { t: "100 XP BONUS", d: "Tecrübene tecrübe kattın!", i: "📖", fn: () => { state.xp += 100; checkLevelUp(); } };
            else if(actual < 225) p = { t: "SÜPRİZ HEDİYE", d: "150 Med-Coin kazandın!", i: "🎁", fn: () => state.coins += 150 };
            else if(actual < 270) p = { t: "150 MED-COIN", d: "Mesai ücreti yattı!", i: "💰", fn: () => state.coins += 150 };
            else if(actual < 315) p = { t: "20 XP", d: "Az biraz tecrübe.", i: "🎓", fn: () => { state.xp += 20; checkLevelUp(); } };
            else p = { t: "BOŞ", d: "Şansına küs, bir dahaki sefere!", i: "📉", fn: () => {} };
            
            p.fn();
            updateUI();
            showReward(p.t, p.d, p.i);
        }, 4000);
    }

    function showReward(t, d, i) {
        document.getElementById('rew-icon').innerText = i;
        document.getElementById('rew-title').innerText = t;
        document.getElementById('rew-desc').innerHTML = d;
        document.getElementById('reward-modal').classList.remove('hidden');
    }

    function closeReward() {
        document.getElementById('reward-modal').classList.add('hidden');
        document.getElementById('wheel-modal').classList.add('hidden');
        document.getElementById('wheel').style.transform = "rotate(0deg)";
        state.busy = false;
        next();
    }

    function buy(type, price) {
        if(state.coins >= price) {
            state.coins -= price;
            if(type === 'heart') state.lives++;
            if(type === 'skip') next();
            if(type === 'hint') {
                const b = Array.from(document.querySelectorAll('.opt-btn'));
                b.filter(x => x.innerText !== state.current.tr).slice(0,2).forEach(x => x.style.opacity = '0.3');
            }
            updateUI();
        } else {
            alert("Yeterli paran yok! Soru çözerek kazanabilirsin.");
        }
    }

    function speak() {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(state.current.de);
        u.lang = 'de-DE'; window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
