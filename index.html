<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschAcademy Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf5; --accent: #e65100; --accent2: #2e7d32; --dark: #1a1612; --border: #e0d8cc; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--dark); font-family:'Outfit',sans-serif; padding-bottom: 80px; }
        header { background: white; border-bottom: 2px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .logo { font-family: 'Fraunces'; font-size: 1.5rem; color: var(--accent); cursor: pointer; text-decoration:none; font-weight:900; }
        .container { max-width: 500px; margin: 1.5rem auto; padding: 0 1rem; }
        .hidden { display: none !important; }

        /* BUTONLAR */
        .btn { background: var(--dark); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: 700; width: 100%; font-size: 0.9rem; margin-bottom: 8px; transition: 0.2s; text-align: center; }
        .btn-test { background: var(--accent2); margin-bottom: 2rem; display: block; }
        
        /* SINAV */
        .quiz-box { background: white; padding: 2rem; border-radius: 25px; border: 1px solid var(--border); }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 10px; background: white; cursor: pointer; text-align: left; font-family: inherit; }
        .correct { background-color: #c8e6c9 !important; color: #1b5e20 !important; }
        .wrong { background-color: #ffcdd2 !important; color: #b71c1c !important; }

        /* İÇERİK KARTLARI */
        .card { background: white; border-radius: 25px; padding: 2rem; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .g-title { font-family: 'Fraunces'; font-size: 1.8rem; margin-bottom: 1rem; color: var(--accent); }
        .g-content { line-height: 1.6; font-size: 1rem; }
        .read-box { text-align: left; }
        .read-text { font-style: italic; background: #f9f6f2; padding: 1rem; border-radius: 10px; margin-bottom: 1rem; }

        /* ALT NAVİGASYON */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 700; color: #999; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 1.2rem; margin-bottom: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">DEUTSCH<em>ACADEMY</em></div>
    <div id="statusLabel" style="font-size: 0.75rem; font-weight: 800; color: #999;">ANA SAYFA</div>
</header>

<div class="container">
    
    <div id="screen-home">
        <h1 style="font-family:'Fraunces'; font-size: 2.2rem; text-align: center; margin-bottom: 1rem;">Hoş Geldin!</h1>
        <button class="btn btn-test" onclick="startQuiz()">📝 SEVİYE TESPİT SINAVI</button>
        <p style="font-weight: 800; font-size: 0.7rem; color: #bbb; margin-bottom: 10px;">KUR SEÇEREK BAŞLA</p>
        <button class="btn" onclick="initModule('A1')">A1 - Başlangıç</button>
        <button class="btn" onclick="initModule('A2')">A2 - Temel</button>
        <button class="btn" onclick="initModule('B1')">B1 - Orta</button>
    </div>

    <div id="screen-quiz" class="hidden">
        <div class="quiz-box">
            <div id="quiz-progress" style="font-weight:800; color:var(--accent); font-size:0.8rem;"></div>
            <h2 id="quiz-question" style="margin: 1rem 0; font-family:'Fraunces';"></h2>
            <div id="quiz-options"></div>
        </div>
    </div>

    <div id="screen-main" class="hidden">
        
        <div id="sub-vocab" class="sub-screen">
            <div id="prog" style="font-size:0.8rem; margin-bottom:10px; font-weight:700; color:#999;"></div>
            <div class="card" style="text-align:center;">
                <h1 id="vWord" style="font-family:'Fraunces'; font-size:2.5rem;">-</h1>
                <p id="vTr" style="font-size:1.3rem; color:var(--accent2); font-weight:600; margin-bottom:1rem;">-</p>
                <div style="background:#f9f6f2; padding:1rem; border-radius:15px; border-left:5px solid var(--accent); text-align:left; margin-bottom:1rem;">
                    <p id="vExDe" style="font-weight:600;"></p>
                    <p id="vExTr" style="font-size:0.9rem; color:#666;"></p>
                </div>
                <button class="btn" style="background:var(--accent);" onclick="nextVocab()">Sonraki Kelime →</button>
                <button class="btn" style="background:#f0f0f0; color:#555;" onclick="speak(document.getElementById('vWord').innerText)">🔊 Telaffuz</button>
            </div>
        </div>

        <div id="sub-grammar" class="sub-screen hidden">
            <div class="card">
                <h2 id="gTitle" class="g-title">Gramer Konusu</h2>
                <div id="gContent" class="g-content">Buraya gramer açıklamaları gelecek...</div>
            </div>
        </div>

        <div id="sub-reading" class="sub-screen hidden">
            <div class="card read-box">
                <h2 id="rTitle" class="g-title">Okuma Parçası</h2>
                <div id="rText" class="read-text">Metin buraya gelecek...</div>
                <div id="rTr" style="font-size:0.9rem; color:#666; border-top:1px solid #eee; pt:1rem;">Türkçe çeviri...</div>
            </div>
        </div>

    </div>

</div>

<div id="main-nav" class="nav-bar hidden">
    <button class="nav-item active" onclick="switchSub('vocab')"><span class="nav-icon">📖</span>Kelime</button>
    <button class="nav-item" onclick="switchSub('grammar')"><span class="nav-icon">⚖️</span>Gramer</button>
    <button class="nav-item" onclick="switchSub('reading')"><span class="nav-icon">📑</span>Okuma</button>
    <button class="nav-item" onclick="location.reload()"><span class="nav-icon">🏠</span>Menü</button>
</div>

let qIdx = 0, score = 0, currentLevel = 'A1', vCursor = 0;

// --- FONKSİYONLAR ---
function startQuiz() {
    qIdx = 0; score = 0;
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-quiz').classList.remove('hidden');
    showQuiz();
}

function showQuiz() {
    const q = quizData[qIdx];
    document.getElementById('quiz-progress').innerText = `SORU ${qIdx+1}/${quizData.length}`;
    document.getElementById('quiz-question').innerText = q.q;
    const box = document.getElementById('quiz-options'); box.innerHTML = "";
    q.a.forEach((opt, i) => {
        const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = opt;
        btn.onclick = () => {
            if(i === q.c) { btn.classList.add('correct'); score++; } else { btn.classList.add('wrong'); }
            setTimeout(() => { qIdx++; if(qIdx < quizData.length) showQuiz(); else { alert("Puan: "+score); initModule('A1'); } }, 800);
        };
        box.appendChild(btn);
    });
}

function initModule(lvl) {
    currentLevel = lvl; vCursor = 0;
    document.getElementById('statusLabel').innerText = lvl + " MODÜLÜ";
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-quiz').classList.add('hidden');
    document.getElementById('screen-main').classList.remove('hidden');
    document.getElementById('main-nav').classList.remove('hidden');
    renderVocab(); renderGrammar(); renderReading();
}

function switchSub(type) {
    document.querySelectorAll('.sub-screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('sub-' + type).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

function renderVocab() {
    const list = vocabData[currentLevel];
    const item = list[vCursor];
    document.getElementById('prog').innerText = `${vCursor + 1} / ${list.length}`;
    document.getElementById('vWord').innerText = item.w;
    document.getElementById('vTr').innerText = item.t;
    document.getElementById('vExDe').innerText = item.exD;
    document.getElementById('vExTr').innerText = item.exT;
}

function nextVocab() { vCursor = (vCursor + 1) % vocabData[currentLevel].length; renderVocab(); }

function renderGrammar() {
    const g = grammarData[currentLevel];
    document.getElementById('gTitle').innerText = g.title;
    document.getElementById('gContent').innerHTML = g.content;
}

function renderReading() {
    const r = readingData[currentLevel];
    document.getElementById('rTitle').innerText = r.title;
    document.getElementById('rText').innerText = r.text;
    document.getElementById('rTr').innerText = r.tr;
}

function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'de-DE'; window.speechSynthesis.speak(u); }
</script>
