<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PflegeDeutsch Pro - ASIL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --nurse-blue: #0ea5e9; --med-green: #10b981; --warning-gold: #f59e0b;
            --danger-red: #ef4444; --bg: #f1f5f9;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        #app { width: 100%; max-width: 480px; padding: 15px; position: relative; }

        /* GİRİŞ */
        #login-screen {
            position: fixed; inset: 0; background: white; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        /* MARKET - ARTIK HEP GÖRÜNÜR */
        .market-header {
            background: white; border-radius: 20px; padding: 12px; margin-bottom: 15px;
            display: flex; justify-content: space-around; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid var(--nurse-blue);
        }
        .shop-item { 
            text-align: center; cursor: pointer; transition: 0.2s; padding: 5px; border-radius: 10px;
        }
        .shop-item:active { transform: scale(0.9); }
        .shop-icon { font-size: 20px; display: block; }
        .shop-price { font-size: 10px; font-weight: 800; color: var(--warning-gold); }

        /* OYUN KARTI */
        .card {
            background: white; border-radius: 30px; padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center;
            border-bottom: 5px solid var(--nurse-blue); margin-bottom: 20px;
        }

        .vaka-box {
            background: #eff6ff; border-radius: 15px; padding: 15px;
            font-size: 13px; color: #1e40af; margin-bottom: 15px; line-height: 1.5;
            border-left: 4px solid var(--nurse-blue); text-align: left;
        }

        /* BUTONLAR */
        .opt-btn {
            background: white; border: 2px solid #e2e8f0; border-radius: 18px;
            padding: 16px; width: 100%; margin-bottom: 12px; font-weight: 600;
            text-align: left; cursor: pointer; transition: 0.3s; display: flex; align-items: center;
        }
        .opt-btn:hover { border-color: var(--nurse-blue); background: #f0f9ff; }

        .progress-container { height: 8px; background: #e2e8f0; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #progress-bar { height: 100%; width: 100%; background: var(--nurse-blue); transition: linear 1s; }

        .badge { background: var(--nurse-blue); color: white; padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 800; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align: center;">
            <span style="font-size: 60px;">👩‍⚕️</span>
            <h1 style="font-family:'Montserrat'; color:var(--nurse-blue); margin:10px 0;">PflegeDeutsch</h1>
            <p style="font-size: 14px; color: #64748b;">Hemşirelik Kariyerine Hoş Geldiniz.</p>
            <input type="text" id="user-name" placeholder="Adınız Soyadınız" style="width:100%; padding:15px; border-radius:15px; border:2px solid #ddd; margin:20px 0; text-align:center;">
            <button onclick="startApp()" style="background:var(--nurse-blue); color:white; border:none; padding:15px 40px; border-radius:15px; font-weight:900; cursor:pointer; width:100%;">NÖBETE BAŞLA ➔</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:0 5px;">
            <div>
                <span class="badge" id="rank-display">SCHÜLER</span>
                <div style="font-weight:900; font-size:14px;" id="name-display">Hemşire</div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:900; color:var(--warning-gold);">💰 <span id="xp-display">0</span> XP</div>
                <div style="font-size:12px;">❤️ <span id="lives-display">5</span></div>
            </div>
        </div>

        <div class="market-header">
            <div class="shop-item" onclick="buyItem('heart', 50)">
                <span class="shop-icon">💉</span>
                <span style="font-size:10px; font-weight:700;">Can Al</span>
                <span class="shop-price">50 XP</span>
            </div>
            <div class="shop-item" onclick="buyItem('time', 30)">
                <span class="shop-icon">☕</span>
                <span style="font-size:10px; font-weight:700;">Zaman+</span>
                <span class="shop-price) ">30 XP</span>
            </div>
            <div class="shop-item" onclick="buyItem('skip', 100)">
                <span class="shop-icon">🚑</span>
                <span style="font-size:10px; font-weight:700;">Pas Geç</span>
                <span class="shop-price">100 XP</span>
            </div>
        </div>

        <div class="progress-container"><div id="progress-bar"></div></div>

        <div id="game-zone">
            <div class="card">
                <div id="vaka-display" class="vaka-box">
                    <b>PFLEGE-BERICHT:</b> <br> <span id="vaka-text">...</span>
                </div>
                <span id="q-icon" style="font-size:40px; display:block; margin-bottom:10px;">🩺</span>
                <div id="art-label" class="badge">DER</div>
                <h2 id="q-word" style="margin:10px 0; font-size:24px; font-weight:900;">...</h2>
                <button onclick="speak()" style="border:none; background:#f0f9ff; padding:10px; border-radius:50%; cursor:pointer;">🔊</button>
            </div>
            <div id="options-grid"></div>
        </div>

        <div id="over-screen" class="hidden">
            <div class="card">
                <h1 style="font-size:50px;">☕</h1>
                <h2>Mola Zamanı!</h2>
                <div id="mistake-list" style="text-align:left; font-size:12px; background:#fff1f2; padding:15px; border-radius:15px; margin:15px 0;"></div>
                <button onclick="location.reload()" style="background:var(--nurse-blue); color:white; border:none; padding:15px; border-radius:15px; width:100%; font-weight:900;">YENİ NÖBET</button>
            </div>
        </div>
    </div>

<script>
    const DATA = [
        { de: "Blutdruckmessung", art: "die", tr: "Tansiyon ölçümü", icon: "🩺", vaka: "Der Patient hat einen Wert von 140/90 mmHg. Was machen Sie?" },
        { de: "Körperpflege", art: "die", tr: "Vücut bakımı", icon: "🧼", vaka: "Ein bettlägeriger Patient braucht Hilfe beim Waschen." },
        { de: "Verbandwechsel", art: "der", tr: "Pansuman değişimi", icon: "🩹", vaka: "Die Wunde am Bein muss neu versorgt werden." },
        { de: "Medikamentengabe", art: "die", tr: "İlaç verme", icon: "💊", vaka: "Frau Müller muss ihre Tabletten vor dem Essen einnehmen." },
        { de: "Dekubitusprophylaxe", art: "die", tr: "Yatak yarası önleme", icon: "🛏️", vaka: "Der Patient muss alle 2 Stunden gelagert werden." },
        { de: "Insulinspritze", art: "die", tr: "İnsülin iğnesi", icon: "💉", vaka: "Der Blutzuckerwert ist hoch. Was bereiten Sie vor?" },
        { de: "Sturzprophylaxe", art: "die", tr: "Düşmeyi önleme", icon: "🚶", vaka: "Der Patient ist unsicher beim Gehen. Was nutzen Sie?" },
        { de: "Dokumentation", art: "die", tr: "Dokümantasyon", icon: "📋", vaka: "Alle Pflegemaßnahmen müssen im PC eingetragen werden." }
    ];

    let state = { name: "", xp: 0, lives: 5, current: null, timer: 20, interval: null, mistakes: [] };

    function startApp() {
        state.name = document.getElementById('user-name').value || "Hemşire";
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('name-display').innerText = state.name;
        nextTask();
    }

    function buyItem(type, cost) {
        if(state.xp >= cost) {
            state.xp -= cost;
            if(type === 'heart') state.lives++;
            if(type === 'time') state.timer += 10;
            if(type === 'skip') nextTask();
            updateUI();
            confetti({ particleCount: 30, colors: ['#f59e0b'] });
        } else { alert("Yetersiz XP! Soru çözerek kazanabilirsin."); }
    }

    function nextTask() {
        state.current = DATA[Math.floor(Math.random() * DATA.length)];
        document.getElementById('vaka-text').innerText = state.current.vaka;
        document.getElementById('q-icon').innerText = state.current.icon;
        document.getElementById('q-word').innerText = state.current.de;
        document.getElementById('art-label').innerText = state.current.art.toUpperCase();
        
        let opts = [state.current.tr];
        while(opts.length < 4) {
            let r = DATA[Math.floor(Math.random() * DATA.length)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options-grid');
        grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "opt-btn";
            b.innerText = "🔹 " + o;
            b.onclick = () => check(o === state.current.tr, b);
            grid.appendChild(b);
        });
        startTimer();
    }

    function check(isCorrect, btn) {
        clearInterval(state.interval);
        if(isCorrect) {
            state.xp += 20;
            btn.style.borderColor = "var(--med-green)";
            btn.style.background = "#ecfdf5";
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
            setTimeout(nextTask, 600);
        } else {
            state.lives--;
            btn.style.borderColor = "var(--danger-red)";
            btn.style.background = "#fef2f2";
            if(!state.mistakes.find(m => m.de === state.current.de)) state.mistakes.push(state.current);
            if(state.lives <= 0) return endGame();
            setTimeout(nextTask, 800);
        }
        updateUI();
    }

    function startTimer() {
        state.timer = 20;
        clearInterval(state.interval);
        state.interval = setInterval(() => {
            state.timer--;
            document.getElementById('progress-bar').style.width = (state.timer/20*100) + "%";
            if(state.timer <= 0) check(false, null);
        }, 1000);
    }

    function updateUI() {
        document.getElementById('xp-display').innerText = state.xp;
        document.getElementById('lives-display').innerText = state.lives;
        let rank = "SCHÜLER";
        if(state.xp > 500) rank = "STATIONSLEITUNG";
        else if(state.xp > 200) rank = "PFLEGEFACHMANN/FRAU";
        document.getElementById('rank-display').innerText = rank;
    }

    function endGame() {
        document.getElementById('game-zone').classList.add('hidden');
        document.getElementById('over-screen').classList.remove('hidden');
        document.getElementById('mistake-list').innerHTML = "<b>HATALARINI NOT AL:</b><br>" + 
            state.mistakes.map(m => `• ${m.art} ${m.de} (${m.tr})`).join('<br>');
    }

    function speak() {
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(`${state.current.art} ${state.current.de}`);
        u.lang = 'de-DE'; window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
