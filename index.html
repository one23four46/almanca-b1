<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDeutsch Academy by ASIL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --med-blue: #00a8cc; --med-dark: #005073;
            --med-light: #e1f5fe; --duo-green: #58cc02;
            --duo-red: #ff4b4b; --glass: rgba(255, 255, 255, 0.95);
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0; display: flex; justify-content: center; min-height: 100vh;
        }
        #app { width: 100%; max-width: 480px; padding: 20px; z-index: 1; }

        /* KARŞILAMA EKRANI */
        #screen-welcome {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #ffffff, #e1f5fe);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; text-align: center;
        }
        .welcome-art { font-size: 100px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .fancy-title {
            font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 45px;
            background: linear-gradient(to right, #005073, #00a8cc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
        }
        .asil-tag {
            position: absolute; bottom: 40px; font-size: 14px; font-weight: 700;
            color: var(--med-blue); letter-spacing: 3px; border-top: 2px solid rgba(0,168,204,0.1); padding-top: 15px;
        }

        /* KART VE BUTON SÜSLEMELERİ */
        .card {
            background: var(--glass); border-radius: 30px; padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); border: 1px solid white; text-align: center; margin-bottom: 25px;
        }
        .btn {
            cursor: pointer; border: none; border-radius: 20px; font-family: 'Montserrat', sans-serif;
            font-weight: 800; padding: 20px; width: 100%; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1); font-size: 16px;
        }
        .btn-main { background: linear-gradient(135deg, var(--med-blue), var(--med-dark)); color: white; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 11px 0 rgba(0,0,0,0.15); }
        .btn-main:active { transform: translateY(5px); box-shadow: none; }

        .option-btn {
            background: white; border: 2px solid #edf2f7; color: #333; margin-bottom: 15px;
            text-align: left; padding-left: 25px; text-transform: none; box-shadow: 0 4px 0 #edf2f7;
        }
        .option-btn:hover { border-color: var(--med-blue); background: #f0fbff; }

        /* ÜST PANEL */
        .header {
            background: white; border-radius: 22px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }
        .progress-bar { flex-grow: 1; height: 14px; background: #eee; border-radius: 10px; margin: 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--duo-green); width: 0%; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .hidden { display: none; }
        .correct { background: #d1fae5 !important; border-color: #10b981 !important; color: #065f46 !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)} }
    </style>
</head>
<body>

    <div id="screen-welcome">

        <h1 class="fancy-title">MEDDEUTSCH</h1>
        <h2 style="font-weight: 300; letter-spacing: 5px; color: var(--med-blue); margin: 0;">ACADEMY</h2>
        <button class="btn btn-main" style="width: auto; padding: 20px 50px; margin-top: 40px;" onclick="enterApp()">BAŞLAMAK İÇİN TIKLAYIN</button>
        <div class="asil-tag">ASIL TARAFINDAN GELİŞTİRİLDİ</div>
    </div>

    <div id="app" class="hidden">
        <div class="header">
            <span id="hearts" style="color:var(--duo-red); font-weight:800; font-size:18px;">❤️ 10</span>
            <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
            <div style="display: flex; flex-direction: column; align-items: flex-end;">
                <span id="score" style="color:var(--med-blue); font-weight:800;">⭐ 0 XP</span>
                <span id="high" style="color:#f59e0b; font-size:11px; font-weight:700;">🏆 REKOR: 0</span>
            </div>
        </div>

        <div id="screen-home">
            <div class="card">
                <div style="font-size: 60px; margin-bottom: 10px;">🧬</div>
                <h2 style="color: var(--med-dark); margin-bottom: 5px;">Hoş Geldiniz</h2>
                <p style="color: #777; font-size: 14px;">Tıp Almancası maratonuna katıl ve en yüksek skoru yap!</p>
            </div>
            <button class="btn btn-main" onclick="startQuiz()">ALIŞTIRMAYA BAŞLA</button>
        </div>

        <div id="screen-quiz" class="hidden">
            <div class="card">
                <div id="q-text" style="font-size: 32px; font-weight: 800; color: var(--med-dark); margin-bottom: 15px;">...</div>
                <button onclick="speak()" style="border:none; background:var(--med-light); border-radius:50%; width:60px; height:60px; cursor:pointer; color:var(--med-blue); font-size:26px;">🔊</button>
            </div>
            <div id="options"></div>
        </div>

        <div id="screen-over" class="hidden">
            <div class="card">
                <div style="font-size: 80px;">💔</div>
                <h2 style="color:var(--duo-red); font-family:'Montserrat';">CANIN TÜKENDİ!</h2>
                <div id="final-xp" style="font-size: 50px; font-weight: 800; margin: 15px 0; color: var(--med-dark);">0 XP</div>
                <p style="color: #666;">Doktor, pes etmek sana yakışmaz!</p>
            </div>
            <button class="btn btn-main" onclick="location.reload()">BAŞA DÖN VE DENE</button>
        </div>
    </div>

    let state = { score: 0, hearts: 10, current: null, count: 0, high: localStorage.getItem('asil_med_rekor') || 0 };

    function enterApp() {
        document.getElementById('screen-welcome').style.opacity = '0';
        document.getElementById('screen-welcome').style.transform = 'scale(1.1)';
        setTimeout(() => {
            document.getElementById('screen-welcome').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            updateUI();
        }, 500);
    }

    function startQuiz() {
        state.score = 0; state.hearts = 10; state.count = 0;
        updateUI(); nextQ();
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
    }

    function nextQ() {
        state.current = VOCAB[Math.floor(Math.random() * VOCAB.length)];
        let opts = [state.current.tr];
        while(opts.length < 4) {
            let r = VOCAB[Math.floor(Math.random() * VOCAB.length)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        document.getElementById('q-text').innerText = state.current.de;
        const div = document.getElementById('options');
        div.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "btn option-btn";
            b.innerText = o;
            b.onclick = () => check(o, b);
            div.appendChild(b);
        });
    }

    function check(val, btn) {
        const all = document.querySelectorAll('.option-btn');
        all.forEach(x => x.style.pointerEvents = 'none');

        if(val === state.current.tr) {
            state.score += 10; state.count++;
            btn.classList.add('correct');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 }, colors: ['#58cc02', '#00a8cc'] });
            playTone(800, 0.2);
            if(state.score > state.high) { state.high = state.score; localStorage.setItem('asil_med_rekor', state.high); }
            document.getElementById('bar').style.width = (state.count * 10 % 101) + "%";
            setTimeout(nextQ, 700);
        } else {
            state.hearts--;
            btn.classList.add('wrong');
            playTone(150, 0.4);
            if(state.hearts <= 0) {
                setTimeout(() => {
                    document.getElementById('final-xp').innerText = state.score + " XP";
                    document.getElementById('screen-quiz').classList.add('hidden');
                    document.getElementById('screen-over').classList.remove('hidden');
                }, 600);
            } else {
                setTimeout(() => {
                    btn.classList.remove('wrong');
                    all.forEach(x => x.style.pointerEvents = 'auto');
                }, 800);
            }
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('hearts').innerText = "❤️ " + state.hearts;
        document.getElementById('score').innerText = "⭐ " + state.score + " XP";
        document.getElementById('high').innerText = "🏆 REKOR: " + state.high;
    }

    function playTone(freq, dur) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.frequency.value = freq; o.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
        o.start(); o.stop(ctx.currentTime + dur);
    }

    function speak() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(state.current.de);
        u.lang = 'de-DE'; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
