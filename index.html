<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedDeutsch Academy by ASIL</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --med-blue: #00a8cc; --med-dark: #005073;
            --duo-green: #58cc02; --duo-red: #ff4b4b;
            --glass: rgba(255, 255, 255, 0.95);
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
        }
        #app-container { width: 100%; max-width: 480px; padding: 20px; position: relative; }

        /* KARŞILAMA EKRANI */
        #screen-welcome {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, #ffffff, #e1f5fe);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; text-align: center; transition: all 0.5s ease;
        }
        .fancy-title {
            font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 42px;
            background: linear-gradient(to right, #005073, #00a8cc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
        }
        .asil-tag {
            position: absolute; bottom: 40px; font-size: 13px; font-weight: 700;
            color: var(--med-blue); letter-spacing: 3px; border-top: 2px solid rgba(0,168,204,0.1); padding-top: 10px;
        }

        /* BUTONLAR */
        .btn {
            cursor: pointer; border: none; border-radius: 20px; font-family: 'Montserrat', sans-serif;
            font-weight: 800; padding: 20px; width: 100%; text-transform: uppercase; transition: 0.2s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1); font-size: 16px; margin-top: 15px;
        }
        .btn-main { background: linear-gradient(135deg, var(--med-blue), var(--med-dark)); color: white; }
        .btn-main:active { transform: translateY(4px); box-shadow: none; }

        .option-btn {
            background: white; border: 2px solid #edf2f7; color: #333; margin-bottom: 12px;
            text-align: left; padding-left: 20px; text-transform: none; font-weight: 600;
        }
        .option-btn:hover { border-color: var(--med-blue); background: #f0fbff; }

        /* ÜST PANEL */
        .header {
            background: white; border-radius: 20px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .progress-bar { flex-grow: 1; height: 12px; background: #eee; border-radius: 10px; margin: 0 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--duo-green); width: 0%; transition: 0.4s; }

        .card { background: var(--glass); border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none !important; }
        
        .correct { background: #d1fae5 !important; border-color: #10b981 !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
    </style>
</head>
<body>

    <div id="screen-welcome">
        <div style="font-size: 80px; margin-bottom: 10px;">🩺</div>
        <h1 class="fancy-title">MEDDEUTSCH</h1>
        <p style="color: #666; font-weight: 600;">Akademik Tıp Eğitim Platformu</p>
        <button class="btn btn-main" style="width: auto; padding: 18px 45px;" onclick="closeWelcome()">DEVAM ETMEK İÇİN TIKLAYIN</button>
        <div class="asil-tag">ASIL TARAFINDAN GELİŞTİRİLDİ</div>
    </div>

    <div id="app-container" class="hidden">
        <div class="header">
            <span id="hearts" style="color:var(--duo-red); font-weight:800;">❤️ 10</span>
            <div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
            <div style="text-align: right;">
                <span id="score" style="color:var(--med-blue); font-weight:800; display:block;">⭐ 0</span>
                <span id="high" style="color:#f59e0b; font-size:10px; font-weight:700;">🏆 REKOR: 0</span>
            </div>
        </div>

        <div id="screen-home">
            <div class="card">
                <div style="font-size: 50px;">🧬</div>
                <h2 style="color: var(--med-dark); margin: 10px 0;">Hoş Geldin Meslektaşım</h2>
                <p style="color: #777; font-size: 14px;">Bilgini test etmeye ve rekorunu kırmaya hazır mısın?</p>
            </div>
            <button class="btn btn-main" onclick="startQuiz()">ALIŞTIRMAYA BAŞLA</button>
        </div>

        <div id="screen-quiz" class="hidden">
            <div class="card">
                <div id="q-text" style="font-size: 28px; font-weight: 800; color: var(--med-dark); margin-bottom: 15px;">...</div>
                <button onclick="speak()" style="border:none; background:#e1f5fe; border-radius:50%; width:55px; height:55px; cursor:pointer; color:var(--med-blue); font-size:22px;">🔊</button>
            </div>
            <div id="options"></div>
        </div>

        <div id="screen-over" class="hidden">
            <div class="card">
                <div style="font-size: 60px;">🚑</div>
                <h2 style="color:var(--duo-red);">CANIN TÜKENDİ!</h2>
                <div id="final-xp" style="font-size: 45px; font-weight: 800; margin: 15px 0; color: var(--med-dark);">0 XP</div>
                <p style="color: #777;">Bir doktor asla pes etmez!</p>
            </div>
            <button class="btn btn-main" onclick="resetGame()">YENİDEN DENE</button>
        </div>
    </div>

<script>
    // --- TAM KELİME LİSTESİ ---
    const VOCAB = [
        { de: "der Herzinfarkt", tr: "Kalp krizi" }, { de: "der Blutdruck", tr: "Kan basıncı" },
        { de: "die Entzündung", tr: "İltihap" }, { de: "die Untersuchung", tr: "Muayene" },
        { de: "das Fieber", tr: "Ateş" }, { de: "der Husten", tr: "Öksürük" },
        { de: "die Übelkeit", tr: "Bulantı" }, { de: "das Erbrechen", tr: "Kusma" },
        { de: "der Schwindel", tr: "Baş dönmesi" }, { de: "die Atemnot", tr: "Nefes darlığı" },
        { de: "der Durchfall", tr: "İshal" }, { de: "die Verstopfung", tr: "Kabızlık" },
        { de: "das Herzklopfen", tr: "Kalp çarpıntısı" }, { de: "der Brustschmerz", tr: "Göğüs ağrısı" },
        { de: "die Bewusstlosigkeit", tr: "Bilinç kaybı" }, { de: "die Lähmung", tr: "Felç" },
        { de: "die Schwellung", tr: "Şişlik" }, { de: "die Wunde", tr: "Yara" },
        { de: "der Puls", tr: "Nabız" }, { de: "die Müdigkeit", tr: "Yorgunluk" },
        { de: "die Abgeschlagenheit", tr: "Halsizlik" }, { de: "der Nachtschweiß", tr: "Gece terlemesi" },
        { de: "der Gewichtsverlust", tr: "Kilo kaybı" }, { de: "der Juckreiz", tr: "Kaşıntı" },
        { de: "der Ausschlag", tr: "Döküntü" }, { de: "die Rötung", tr: "Kızarıklık" },
        { de: "das Taubheitsgefühl", tr: "Uyuşma hissi" }, { de: "das Kribbeln", tr: "Karıncalanma" },
        { de: "die Sehstörung", tr: "Görme bozukluğu" }, { de: "das Ohrensausen", tr: "Kulak çınlaması" },
        { de: "die Schluckbeschwerden", tr: "Yutma güçlüğü" }, { de: "die Heiserkeit", tr: "Ses kısıklığı" },
        { de: "der Schnupfen", tr: "Nezle" }, { de: "die Auswurf", tr: "Balgam" },
        { de: "die Bluthusten", tr: "Kanlı öksürük" }, { de: "das Sodbrennen", tr: "Mide yanması" },
        { de: "die Blähungen", tr: "Gaz sancısı" }, { de: "der Teerstuhl", tr: "Katran dışkı" },
        { de: "das Blut im Stuhl", tr: "Dışkıda kan" }, { de: "das Wasserlassen", tr: "İdrar yapma" },
        { de: "die Regelschmerzen", tr: "Adet sancısı" }, { de: "die Gelenkschmerzen", tr: "Eklem ağrıları" },
        { de: "die Steifigkeit", tr: "Sertlik" }, { de: "die Prellung", tr: "Ezilme" },
        { de: "der Bruch", tr: "Kırık" }, { de: "die Gehirnerschütterung", tr: "Beyin sarsıntısı" },
        { de: "die Krampfader", tr: "Varis" }, { de: "die Thrombose", tr: "Pıhtı" },
        { de: "die Embolie", tr: "Emboli" }, { de: "der Schüttelfrost", tr: "Titreme" },
        { de: "die Appetitlosigkeit", tr: "İştahsızlık" }, { de: "die Schlafstörung", tr: "Uyku bozukluğu" },
        { de: "die Angst", tr: "Korku / Anksiyete" }, { de: "die Unruhe", tr: "Huzursuzluk" },
        { de: "die Depression", tr: "Depresyon" }, { de: "die Verwirrtheit", tr: "Konfüzyon" },
        { de: "die Ohnmacht", tr: "Bayılma" }, { de: "die Blässe", tr: "Solgunluk" },
        { de: "die Gelbsucht", tr: "Sarılık" }, { de: "die Zyanose", tr: "Morarma" },
        { de: "das Ödem", tr: "Ödem" }, { de: "der Aszites", tr: "Karında sıvı birikmesi" },
        { de: "die Hernie", tr: "Fıtık" }, { de: "die Kolik", tr: "Kolik ağrısı" },
        { de: "der Krampf", tr: "Kramp" }, { de: "die Blutung", tr: "Kanama" },
        { de: "der Eiter", tr: "İrin / Cerahat" }, { de: "das Geschwür", tr: "Ülser / Yara" },
        { de: "der Tumor", tr: "Tümör / Ur" }, { de: "die Zyste", tr: "Kist" },
        { de: "die Narbe", tr: "Yara izi" }, { de: "die Atrophie", tr: "Atrofi" },
        { de: "die Hypertrophie", tr: "Hipertrofi" }, { de: "die Stenose", tr: "Stenoz" },
        { de: "die Insuffizienz", tr: "Yetersizlik" }, { de: "die Obstruktion", tr: "Tıkanma" },
        { de: "die Perforation", tr: "Delinme" }, { de: "die Ruptur", tr: "Yırtılma" },
        { de: "die Fraktur", tr: "Kırık" }, { de: "die Luxation", tr: "Çıkık" },
        { de: "die Distorsion", tr: "Burkulma" }, { de: "die Kontusion", tr: "Ezilme" },
        { de: "die Inzision", tr: "Kesi" }, { de: "die Exzision", tr: "Eksizyon" },
        { de: "die Resektion", tr: "Rezeksiyon" }, { de: "die Amputation", tr: "Amputasyon" },
        { de: "die Transplantation", tr: "Nakil" }, { de: "die Implantation", tr: "İmplantasyon" },
        { de: "die Anastomose", tr: "Anastomoz" }, { de: "die Drainage", tr: "Drenaj" },
        { de: "die Punktion", tr: "Ponksiyon" }, { de: "die Biopsie", tr: "Biyopsi" },
        { de: "die Endoskopie", tr: "Endoskopi" }, { de: "die Sonographie", tr: "Ultrason" },
        { de: "die Radiographie", tr: "Röntgen" }, { de: "die Tomographie", tr: "Tomografi" },
        { de: "die Elektrokardiographie", tr: "EKG" }, { de: "die Elektroenzephalographie", tr: "EEG" },
        { de: "die Spirometrie", tr: "Spirometri" }, { de: "die Dialyse", tr: "Diyaliz" },
        { de: "die Infusion", tr: "İnfüzyon" }, { de: "die Injektion", tr: "Enjeksiyon" },
        { de: "die Intubation", tr: "Entübasyon" }, { de: "die Katheterisierung", tr: "Kateterizasyon" },
        { de: "die Anästhesie", tr: "Anestezi" }, { de: "die Sedierung", tr: "Sedasyon" },
        { de: "die Chemotherapie", tr: "Kemoterapi" }, { de: "die Radiotherapie", tr: "Radyoterapi" },
        { de: "die Physiotherapie", tr: "Fizyoterapi" }, { de: "die Rehabilitation", tr: "Rehabilitasyon" },
        { de: "die Prävention", tr: "Önleme" }, { de: "die Prophylaxe", tr: "Profilaksi" },
        { de: "die Diagnose", tr: "Teşhis" }, { de: "die Prognose", tr: "Prognoz" },
        { de: "die Therapie", tr: "Tedavi" }, { de: "die Heilung", tr: "İyileşme" },
        { de: "die Komplikation", tr: "Komplikasyon" }, { de: "die Nebenwirkung", tr: "Yan etki" },
        { de: "die Sepsis", tr: "Sepsis" }, { de: "der Schock", tr: "Şok" },
        { de: "das Koma", tr: "Koma" }, { de: "der Tod", tr: "Ölüm" }
    ];

    let state = {
        score: 0,
        hearts: 10,
        current: null,
        count: 0,
        high: localStorage.getItem('asil_rekor_new') || 0
    };

    // 1. EKRAN: GİRİŞİ KAPAT VE ANA UYGULAMAYI AÇ
    function closeWelcome() {
        document.getElementById('screen-welcome').style.opacity = '0';
        document.getElementById('screen-welcome').style.pointerEvents = 'none';
        setTimeout(() => {
            document.getElementById('screen-welcome').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            updateUI();
        }, 500);
    }

    // 2. EKRAN: ANA SAYFADAN OYUNA GEÇ
    function startQuiz() {
        state.score = 0;
        state.hearts = 10;
        state.count = 0;
        updateUI();
        
        document.getElementById('screen-home').classList.add('hidden');
        document.getElementById('screen-over').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        
        nextQ();
    }

    // SORU ÜRETME
    function nextQ() {
        state.current = VOCAB[Math.floor(Math.random() * VOCAB.length)];
        let opts = [state.current.tr];
        
        while(opts.length < 4) {
            let r = VOCAB[Math.floor(Math.random() * VOCAB.length)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        document.getElementById('q-text').innerText = state.current.de;
        const div = document.getElementById('options');
        div.innerHTML = "";
        
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "btn option-btn";
            b.innerText = o;
            b.onclick = () => checkAnswer(o, b);
            div.appendChild(b);
        });
    }

    // CEVAP KONTROL
    function checkAnswer(val, btn) {
        const all = document.querySelectorAll('.option-btn');
        all.forEach(x => x.style.pointerEvents = 'none');

        if(val === state.current.tr) {
            state.score += 10;
            state.count++;
            btn.classList.add('correct');
            confetti({ particleCount: 70, spread: 60, origin: { y: 0.8 } });
            
            if(state.score > state.high) {
                state.high = state.score;
                localStorage.setItem('asil_rekor_new', state.high);
            }
            
            document.getElementById('bar').style.width = (state.count * 10 % 101) + "%";
            setTimeout(nextQ, 700);
        } else {
            state.hearts--;
            btn.classList.add('wrong');
            
            if(state.hearts <= 0) {
                setTimeout(() => {
                    document.getElementById('final-xp').innerText = state.score + " XP";
                    document.getElementById('screen-quiz').classList.add('hidden');
                    document.getElementById('screen-over').classList.remove('hidden');
                }, 600);
            } else {
                setTimeout(() => {
                    btn.classList.remove('wrong');
                    all.forEach(x => x.style.pointerEvents = 'auto');
                }, 800);
            }
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('hearts').innerText = "❤️ " + state.hearts;
        document.getElementById('score').innerText = "⭐ " + state.score;
        document.getElementById('high').innerText = "🏆 REKOR: " + state.high;
    }

    function resetGame() {
        document.getElementById('screen-over').classList.add('hidden');
        document.getElementById('screen-home').classList.remove('hidden');
    }

    function speak() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(state.current.de);
        u.lang = 'de-DE'; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
