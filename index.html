<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschAcademy Pro - Seviye Tespit & Kelime Dağarcığı</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf5; --accent: #e65100; --accent2: #2e7d32; --dark: #1a1612; --border: #e0d8cc; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--dark); font-family:'Outfit',sans-serif; line-height: 1.5; }
        header { background: white; border-bottom: 2px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .logo { font-family: 'Fraunces'; font-size: 1.5rem; color: var(--accent); cursor: pointer; text-decoration:none; font-weight:900; }
        .container { max-width: 500px; margin: 1.5rem auto; padding: 0 1rem; }
        .hidden { display: none !important; }

        /* BUTONLAR */
        .btn { background: var(--dark); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: 700; width: 100%; font-size: 0.9rem; margin-bottom: 8px; transition: 0.2s; text-align: center; display: block; }
        .btn-test { background: var(--accent2); margin-bottom: 2rem; }
        .btn-next { background: var(--accent); }

        /* SINAV */
        .quiz-box { background: white; padding: 2rem; border-radius: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 10px; background: white; cursor: pointer; text-align: left; font-family: inherit; font-size: 1rem; }
        .option-btn:hover { background: #f9f6f2; border-color: var(--accent); }

        /* KART TASARIMI */
        .v-card { background: white; border-radius: 25px; padding: 2rem; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .v-word { font-family: 'Fraunces'; font-size: 2.6rem; margin-bottom: 5px; color: var(--dark); }
        .v-tr { font-size: 1.4rem; color: var(--accent2); font-weight: 600; margin-bottom: 1.5rem; }
        .v-details { display: flex; justify-content: center; gap: 10px; font-size: 0.8rem; color: #888; margin-bottom: 1rem; font-weight: 700; text-transform: uppercase; }
        .v-details span { background: #eee; padding: 2px 10px; border-radius: 5px; }
        .v-example { background: #f9f6f2; padding: 1.2rem; border-radius: 15px; border-left: 5px solid var(--accent); text-align: left; cursor: pointer; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">DEUTSCH<em>ACADEMY</em></div>
    <div id="statusLabel" style="font-size: 0.75rem; font-weight: 800; color: #999;">MODÜL: ANA SAYFA</div>
</header>

<div class="container">
    
    <div id="screen-home" class="welcome-box" style="text-align: center;">
        <h1 style="font-family:'Fraunces'; font-size: 2.2rem; margin-bottom: 1rem;">Hoş Geldin!</h1>
        <p style="margin-bottom: 2rem; color: #666; font-size: 0.95rem;">Seviyeni test et veya bir kur seçerek kelime öğrenmeye başla.</p>
        
        <button class="btn btn-test" onclick="startQuiz()">📝 ÜCRETSİZ SEVİYE TESPİTİ</button>
        
        <div style="text-align: left;">
            <p style="font-weight: 800; font-size: 0.7rem; color: #bbb; margin-bottom: 10px; letter-spacing: 1px;">KUR SEÇİMİ</p>
            <button class="btn" onclick="init('A1')">A1 - Başlangıç Seviyesi</button>
            <button class="btn" onclick="init('A2')">A2 - Temel Seviye</button>
            <button class="btn" onclick="init('B1')">B1 - Orta Seviye</button>
        </div>
    </div>

    <div id="screen-quiz" class="hidden">
        <div class="quiz-box">
            <div id="quiz-progress" style="color: var(--accent); font-weight: 800; font-size: 0.8rem; margin-bottom: 10px;"></div>
            <h2 id="quiz-question" style="margin-bottom: 1.5rem; font-family: 'Fraunces'; font-size: 1.4rem;"></h2>
            <div id="quiz-options"></div>
        </div>
    </div>

    <div id="screen-learning" class="hidden">
        <div id="prog" style="font-size: 0.8rem; margin-bottom: 10px; color: #999; font-weight: 700;">1 / 150</div>
        <div class="v-card">
            <div class="v-details">
                <span id="vType">TÜR</span>
                <span id="vPlural">ÇOĞUL</span>
            </div>
            <h1 id="vWord">Wort</h1>
            <p id="vTr">Anlam</p>
            
            <div class="v-example" onclick="speak(document.getElementById('vExDe').innerText)">
                <small style="color:var(--accent); font-weight:900; font-size: 0.7rem;">CÜMLE İÇİNDE 🔊</small>
                <p id="vExDe" style="margin-top:5px; font-weight:600; font-size: 1.05rem;"></p>
                <p id="vExTr" style="font-size:0.9rem; color:#777;"></p>
            </div>

            <button class="btn btn-next" style="margin-top: 1.5rem;" onclick="next()">Sonraki Kelime →</button>
            <button class="btn" style="background:#f0f0f0; color:#555;" onclick="speak(document.getElementById('vWord').innerText)">🔊 Telaffuz Et</button>
            <button class="btn" style="background:none; color:#bbb; font-size: 0.7rem; margin-top: 10px;" onclick="location.reload()">Ana Menüye Dön</button>
        </div>
    </div>

</div>

let qIdx = 0; let score = 0;
let currentList = []; let cursor = 0;

// SINAV FONKSİYONLARI
function startQuiz() {
    qIdx = 0; score = 0;
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-quiz').classList.remove('hidden');
    showQ();
}

function showQ() {
    const q = quizData[qIdx];
    document.getElementById('quiz-progress').innerText = `SORU ${qIdx + 1} / ${quizData.length}`;
    document.getElementById('quiz-question').innerText = q.q;
    const optBox = document.getElementById('quiz-options');
    optBox.innerHTML = "";
    q.a.forEach((opt, i) => {
        const b = document.createElement('button');
        b.className = "option-btn";
        b.innerText = opt;
        b.onclick = () => { if(i===q.c) score++; qIdx++; if(qIdx < quizData.length) showQ(); else finish(); };
        optBox.appendChild(b);
    });
}

function finish() {
    let res = "A1";
    if(score >= 4) res = "A2";
    if(score >= 7) res = "B1";
    alert(`Sınav Bitti! Skorun: ${score}/${quizData.length}\nSeviyen: ${res}`);
    init(res);
}

// ÖĞRENME FONKSİYONLARI
function init(lvl) {
    currentList = data[lvl] || data['A1'];
    cursor = 0;
    document.getElementById('statusLabel').innerText = "MODÜL: " + lvl;
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-quiz').classList.add('hidden');
    document.getElementById('screen-learning').classList.remove('hidden');
    render();
}

function render() {
    const item = currentList[cursor];
    document.getElementById('prog').innerText = `${cursor + 1} / ${currentList.length}`;
    document.getElementById('vWord').innerText = item.w;
    document.getElementById('vTr').innerText = item.t;
    document.getElementById('vType').innerText = item.tp;
    document.getElementById('vPlural').innerText = item.p;
    document.getElementById('vExDe').innerText = item.exD;
    document.getElementById('vExTr').innerText = item.exT;
    speak(item.w);
}

function next() { cursor = (cursor + 1) % currentList.length; render(); }

function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'de-DE'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
}
