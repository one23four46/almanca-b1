<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschAcademy Pro - Kesintisiz Görsel Eğitim</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf5; --accent: #e65100; --accent2: #2e7d32; --dark: #1a1612; --border: #e0d8cc;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--dark); font-family:'Outfit',sans-serif; line-height:1.4; }
        
        header { background: white; border-bottom: 2px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .logo { font-family: 'Fraunces'; font-size: 1.6rem; color: var(--accent); cursor: pointer; }

        .container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .hidden { display: none !important; }

        /* HOME SCREEN */
        .hero { text-align: center; padding: 2rem 0; animation: fadeIn 0.5s ease; }
        .lvl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 2rem; }
        .lvl-btn { background: white; border: 2px solid var(--border); padding: 20px; border-radius: 15px; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .lvl-btn:hover { border-color: var(--accent); background: #fff5e6; }

        /* CARD */
        .v-card { background: white; border-radius: 30px; padding: 2rem; box-shadow: 0 15px 40px rgba(0,0,0,0.08); border: 1px solid var(--border); text-align: center; }
        .v-image { width: 100%; height: 250px; background: #eee; border-radius: 20px; margin-bottom: 1.5rem; overflow: hidden; position: relative; }
        .v-image img { width: 100%; height: 100%; object-fit: cover; }
        
        .v-type { font-size: 0.7rem; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .v-word { font-family: 'Fraunces'; font-size: 2.8rem; margin: 0.2rem 0; }
        .v-plural { font-size: 1rem; color: #666; font-style: italic; margin-bottom: 0.5rem; }
        .v-tr { font-size: 1.4rem; color: var(--accent2); font-weight: 600; margin-bottom: 1.5rem; }

        .v-example { background: #f8f8f8; padding: 1.2rem; border-radius: 15px; border-left: 5px solid var(--accent); text-align: left; cursor: pointer; margin-bottom: 1.5rem; }

        .btn { background: var(--dark); color: white; border: none; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: 700; width: 100%; font-size: 1rem; }
        .btn-next { background: var(--accent); margin-top: 10px; }
        
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">Deutsch<em>Academy</em></div>
    <div id="status" style="font-weight:800; color:#888;">GİRİŞ</div>
</header>

<div class="container">
    <div id="screen-home" class="hero">
        <h1 style="font-family:'Fraunces'; font-size:2.5rem;">Hoş Geldin!</h1>
        <p>Hangi seviyede çalışmak istersin?</p>
        <div class="lvl-grid">
            <button class="lvl-btn" onclick="init('A1')">A1</button>
            <button class="lvl-btn" onclick="init('A2')">A2</button>
            <button class="lvl-btn" onclick="init('B1')">B1</button>
            <button class="lvl-btn" onclick="init('B2')">B2</button>
            <button class="lvl-btn" onclick="init('C1')">C1</button>
        </div>
    </div>

    <div id="screen-learning" class="hidden">
        <div class="v-card">
            <div id="vType" class="v-type">İSİM</div>
            <div class="v-image">
                <img id="vImg" src="" alt="Yükleniyor...">
            </div>
            <h1 id="vWord" class="v-word">Wort</h1>
            <p id="vPlural" class="v-plural">die Wörter</p>
            <p id="vTr" class="v-tr">Anlam</p>
            
            <div class="v-example" onclick="speakEx()">
                <small style="color:var(--accent); font-weight:900;">ÖRNEK CÜMLE 🔊</small>
                <p id="vExDe" style="margin-top:5px; font-weight:600;"></p>
                <p id="vExTr" style="font-size:0.9rem; color:#666;"></p>
            </div>

            <button class="btn" onclick="speakW()">🔊 Dinle</button>
            <button class="btn btn-next" onclick="goNext()">Sonraki Kelime →</button>
        </div>
    </div>
</div>

<script>
// --- BENZERSİZ KELİME LİSTESİ ---
const data = {
    'A1': [
        {w:"das Frühstück", t:"Kahvaltı", tp:"İsim", p:"die Frühstücke", exD:"Das Frühstück ist fertig.", exT:"Kahvaltı hazır.", img:"breakfast"},
        {w:"trinken", t:"İçmek", tp:"Fiil", p:"-", exD:"Ich trinke gerne Tee.", exT:"Severek çay içerim.", img:"tea"}
    ],
    'A2': [
        {w:"die Ausbildung", t:"Eğitim / Mesleki eğitim", tp:"İsim", p:"die Ausbildungen", exD:"Meine Ausbildung dauert drei Jahre.", exT:"Eğitimim üç yıl sürüyor.", img:"study"},
        {w:"besuchen", t:"Ziyaret etmek", tp:"Fiil", p:"-", exD:"Ich besuche meine Oma.", exT:"Büyükannemi ziyaret ediyorum.", img:"visit"}
    ],
    'B1': [
        {w:"die Herausforderung", t:"Zorluk / Meydan okuma", tp:"İsim", p:"die Herausforderungen", exD:"Das ist eine neue Herausforderung.", exT:"Bu yeni bir meydan okuma.", img:"mountain"},
        {w:"verantwortlich", t:"Sorumlu", tp:"Sıfat", p:"-", exD:"Du bist dafür verantwortlich.", exT:"Bundan sen sorumlusun.", img:"manager"}
    ],
    'B2': [
        {w:"die Auswirkung", t:"Etki / Sonuç", tp:"İsim", p:"die Auswirkungen", exD:"Die Auswirkungen sind katastrophal.", exT:"Etkiler felaket düzeyinde.", img:"impact"},
        {w:"behaupten", t:"İddia etmek", tp:"Fiil", p:"-", exD:"Er behauptet das Gegenteil.", exT:"O aksini iddia ediyor.", img:"argue"}
    ],
    'C1': [
        {w:"die Schlussfolgerung", t:"Çıkarım / Sonuç", tp:"İsim", p:"die Schlussfolgerungen", exD:"Das ist eine logische Schlussfolgerung.", exT:"Bu mantıklı bir çıkarım.", img:"logic"}
    ]
};

let currentList = [];
let i = 0;

function init(lvl) {
    currentList = data[lvl];
    i = 0;
    document.getElementById('status').textContent = lvl + " MODÜLÜ";
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-learning').classList.remove('hidden');
    render();
}

function render() {
    const item = currentList[i];
    document.getElementById('vWord').textContent = item.w;
    document.getElementById('vTr').textContent = item.t;
    document.getElementById('vType').textContent = item.tp;
    document.getElementById('vPlural').textContent = item.tp === "İsim" ? item.p : "";
    document.getElementById('vExDe').textContent = item.exD;
    document.getElementById('vExTr').textContent = item.exT;
    
    // YENİ GÖRSEL SİSTEMİ (Direct Search)
    document.getElementById('vImg').src = `https://loremflickr.com/600/400/germany,${item.img}/all`;
    
    speak(item.w);
}

function goNext() {
    i = (i + 1) % currentList.length;
    render();
}

function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'de-DE'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
}

function speakW() { speak(currentList[i].w); }
function speakEx() { speak(currentList[i].exD); }
</script>
</body>
</html>
