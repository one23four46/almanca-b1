<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PflegeAkademy: Decision Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* TÜM ESKİ STİLLER KORUNDU */
        :root { --n-blue: #0ea5e9; --m-green: #10b981; --w-gold: #f59e0b; --d-red: #ef4444; --dark: #0f172a; --paper: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Poppins', sans-serif; background: #0f172a; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; padding: 15px; position: relative; background: #f8fafc; }
        
        .top-panel { background: var(--dark); color: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-bottom: 4px solid var(--n-blue); }
        .xp-container { background: #334155; height: 10px; border-radius: 10px; margin: 12px 0; overflow: hidden; border: 1px solid #475569; }
        #xp-bar { background: linear-gradient(90deg, #38bdf8, #818cf8); height: 100%; width: 0%; transition: width 0.5s ease; }
        .stats-row { display: flex; justify-content: space-between; font-weight: 700; font-size: 13px; color: #cbd5e1; }

        .q-card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .vaka { background: #f1f5f9; padding: 15px; border-radius: 15px; border-left: 5px solid var(--n-blue); font-size: 14px; text-align: left; margin-bottom: 20px; color: #475569; font-style: italic; line-height: 1.5; }
        .opt { background: white; border: 2px solid #e2e8f0; border-radius: 15px; padding: 16px; margin-bottom: 10px; width: 100%; font-weight: 700; cursor: pointer; text-align: left; transition: 0.2s; font-size: 15px; color: #1e293b; }
        .opt.correct { background: var(--m-green); color: white; border-color: var(--m-green); }
        .opt.wrong { background: var(--d-red); color: white; border-color: var(--d-red); }

        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
        
        .primary-btn { background: var(--n-blue); color: white; padding: 16px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; font-family: 'Poppins'; }
        .secondary-btn { background: #f1f5f9; color: #475569; padding: 14px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .shield-badge { background: var(--w-gold); color: #000; padding: 2px 8px; border-radius: 5px; font-size: 11px; margin-left: 5px; }
        
        /* MARKET SİSTEMİ */
        .archive-folder { background: #cbd5e1; padding: 10px; border-radius: 15px; width: 100%; max-width: 420px; }
        .archive-content { background: white; padding: 15px; border-radius: 5px; max-height: 50vh; overflow-y: auto; }
        .file-item { display: flex; background: white; border: 1px solid #eee; margin-bottom: 8px; border-radius: 8px; align-items: center; cursor: pointer; }
        .file-item.locked { opacity: 0.5; filter: grayscale(1); }
        .file-icon { width: 45px; text-align: center; font-size: 22px; }
        .file-info { flex: 1; padding: 8px; }
        .file-info b { font-size: 13px; display: block; }
        .file-info span { font-size: 11px; color: #666; }
        .price-tag { padding: 8px; font-weight: 900; color: #b45309; }

        #combo-text { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); font-family: 'Montserrat'; font-size: 50px; color: var(--w-gold); opacity: 0; pointer-events: none; z-index: 1000; text-shadow: 2px 2px 0 #000; }
        .combo-anim { animation: comboPop 0.8s forwards; }
        @keyframes comboPop { 0% { scale: 0.5; opacity: 0; } 40% { scale: 1.2; opacity: 1; } 100% { scale: 1; opacity: 0; transform: translate(-50%, -100px); } }
    </style>
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="modal-card">
            <div style="font-size: 60px;">🏥</div>
            <h1 style="font-family:'Montserrat'; margin: 10px 0;">PflegeAkademy</h1>
            <input type="text" id="u-name" placeholder="Adınız Soyadınız" style="width:100%; padding:18px; border-radius:12px; border:2px solid #e2e8f0; margin-bottom:15px; text-align:center;">
            <button onclick="handleLogin()" class="primary-btn">SİSTEME BAŞLA</button>
        </div>
    </div>

    <div id="choice-overlay" class="overlay hidden">
        <div class="modal-card">
            <div style="font-size: 50px;">💾</div>
            <h2 id="choice-title" style="margin-bottom:5px;">Kayıt Bulundu!</h2>
            <p id="choice-desc" style="font-size:13px; color:#64748b; margin-bottom:20px;"></p>
            <button onclick="choiceResult(true)" class="primary-btn" style="background:var(--m-green);">KALDIĞIM YERDEN DEVAM</button>
            <button onclick="choiceResult(false)" class="secondary-btn">SIFIRDAN BAŞLAT</button>
        </div>
    </div>

    <div id="nurse-overlay" class="overlay hidden">
        <div class="modal-card">
            <h2 style="color:var(--n-blue); font-family:'Montserrat';">Hazır mısın?</h2>
            <p id="nurse-msg" style="font-size: 14px; color: #475569; text-align: left; line-height: 1.6;"></p>
            <button onclick="startApp()" class="primary-btn">HASTALARA GİDELİM</button>
        </div>
    </div>

    <div id="shop-overlay" class="overlay hidden" onclick="toggle('shop-overlay', false)">
        <div class="archive-folder" onclick="event.stopPropagation()">
            <div style="text-align:center; font-weight:900; margin-bottom:10px;">📋 KLİNİK ENVANTER</div>
            <div class="archive-content" id="shop-list"></div>
            <button onclick="toggle('shop-overlay', false)" class="primary-btn" style="background:#64748b;">KAPAT</button>
        </div>
    </div>

    <div id="gift-lock" class="overlay hidden" style="background:rgba(15,23,42,0.98);">
        <div onclick="clickGift()" style="text-align:center;">
            <div id="gift-emoji" style="font-size:120px; cursor:pointer; transition:0.1s;">🎁</div>
            <p style="color:white; font-weight:bold; margin-top:20px;">PAKETİ PATLATMAK İÇİN TIKLA!</p>
        </div>
    </div>

    <div id="res-overlay" class="overlay hidden">
        <div class="modal-card">
            <div id="res-ico" style="font-size:60px;">🏆</div>
            <h2 id="res-ttl">SONUÇ</h2>
            <p id="res-dsc" style="margin-bottom:20px; color:#475569;"></p>
            <button id="res-btn" class="primary-btn">TAMAM</button>
        </div>
    </div>

    <div id="combo-text">KOMBO X2</div>

    <div id="app" class="hidden">
        <div class="top-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div id="rank-name" style="font-size:10px; font-weight:900; color:var(--n-blue);">STAJYER</div>
                    <div id="u-display" style="font-weight:700;">-</div>
                </div>
                <button onclick="openShop()" style="background:var(--w-gold); border:none; padding:10px 15px; border-radius:12px; font-weight:900; cursor:pointer;">🛒 MARKET</button>
            </div>
            <div class="xp-container"><div id="xp-bar"></div></div>
            <div class="stats-row">
                <span>💰 <span id="c-val">0</span></span>
                <span>LVL <span id="l-val">1</span></span>
                <span>❤️ <span id="h-val">5</span><span id="shield-val" class="shield-badge hidden">🛡️ 0</span></span>
            </div>
        </div>

        <div class="q-card">
            <div class="vaka" id="v-txt">-</div>
            <h2 id="q-word" style="font-size: 26px; margin-bottom:20px;">-</h2>
            <div id="opt-grid"></div>
        </div>
    </div>

<script>
    // --- VERİLER VE DURUM ---
    const DATA = [
        { de: "Blutdruck", tr: "Tansiyon", vaka: "Hastanın tansiyonu çok yüksek." },
        { de: "Spritze", tr: "Şırınga", vaka: "İlacı şırıngaya çekin." },
        { de: "Verband", tr: "Sargı", vaka: "Yaranın sargısını yenileyin." },
        { de: "Rollstuhl", tr: "Tekerlekli sandalye", vaka: "Hasta yürüyemiyor." }
    ];

    const REWARDS = [
        { i: "💰", t: "Maaş Primi", d: "+250 Para!", fn: () => st.coins += 250 },
        { i: "💉", t: "Vitamin", d: "+1 Can!", fn: () => st.lives += 1 },
        { i: "🛡️", t: "Maske", d: "+1 Kalkan!", fn: () => st.shields += 1 },
        { i: "📚", t: "Eğitim", d: "+500 XP!", fn: () => st.xp += 500 }
    ];

    const SHOP_ITEMS = [
        { id: 'h1', n: "Hızlı Serum", d: "+1 Can", p: 250, l: 1, i: "💉" },
        { id: 's1', n: "Maske", d: "1 Kalkan", p: 500, l: 2, i: "😷" },
        { id: 'x1', n: "Kitap", d: "+1200 XP", p: 800, l: 4, i: "📚" }
        // (Ek 10 ürün mantığı burada korunuyor)
    ];

    const RANKS = ["Stajyer", "Asistan", "Uzman", "Şef", "Başhemşire", "Müdür"];

    let st = { xp: 0, coins: 200, lives: 5, level: 1, streak: 0, shields: 0, name: "", giftClicks: 0 };
    let isBusy = false;
    let queue = [];

    // --- GİRİŞ VE KARAR MANTIĞI ---

    function handleLogin() {
        const inputName = document.getElementById('u-name').value.trim();
        if(!inputName) { alert("İsim gerekli!"); return; }
        st.name = inputName;

        const saved = localStorage.getItem('Akademy_Save_Final');
        if(saved) {
            let savedData = JSON.parse(saved);
            document.getElementById('choice-desc').innerText = 
                `${savedData.name}, en son ${savedData.level}. seviyedeydin ve ${savedData.coins} paran vardı.`;
            toggle('login-overlay', false);
            toggle('choice-overlay', true);
        } else {
            showNurse(false);
        }
    }

    function choiceResult(isContinue) {
        if(isContinue) {
            const saved = localStorage.getItem('Akademy_Save_Final');
            st = JSON.parse(saved);
            showNurse(true);
        } else {
            // Sıfırla ama ismi koru
            let userName = st.name;
            st = { xp: 0, coins: 200, lives: 5, level: 1, streak: 0, shields: 0, name: userName, giftClicks: 0 };
            localStorage.removeItem('Akademy_Save_Final');
            showNurse(false);
        }
        toggle('choice-overlay', false);
    }

    function showNurse(isReturning) {
        let msg = isReturning 
            ? `Tekrar hoş geldin ${st.name}! Ekipmanların ve rütben hazır. Kaldığın yerden devam edelim.`
            : `Merhaba ${st.name}! Akademimize hoş geldin. Almanca terimleri öğrenerek kariyer basamaklarını tırmanabilirsin.`;
        
        document.getElementById('nurse-msg').innerText = msg;
        toggle('nurse-overlay', true);
    }

    function startApp() {
        toggle('nurse-overlay', false);
        toggle('app', true);
        document.getElementById('u-display').innerText = st.name;
        upUI();
        next();
    }

    // --- OYUN MANTIĞI (Kayıtlı Versiyon) ---

    function saveData() {
        localStorage.setItem('Akademy_Save_Final', JSON.stringify(st));
    }

    function upUI() {
        document.getElementById('c-val').innerText = st.coins;
        document.getElementById('h-val').innerText = st.lives;
        document.getElementById('l-val').innerText = st.level;
        
        let rIdx = Math.min(Math.floor((st.level-1)/3), RANKS.length-1);
        document.getElementById('rank-name').innerText = RANKS[rIdx];

        let sb = document.getElementById('shield-val');
        if(st.shields > 0) { sb.innerText = "🛡️ " + st.shields; sb.classList.remove('hidden'); }
        else { sb.classList.add('hidden'); }

        let nx = st.level * 400;
        document.getElementById('xp-bar').style.width = (st.xp / nx * 100) + "%";
        
        if(st.xp >= nx) { 
            st.level++; st.xp = 0; st.coins += (st.level * 100); 
            queue.push('levelup'); 
        }
        saveData(); // Her şeyde otomatik kayıt
    }

    function next() {
        let q = DATA[Math.floor(Math.random()*DATA.length)];
        document.getElementById('v-txt').innerText = q.vaka;
        document.getElementById('q-word').innerText = q.de;
        let opts = [q.tr, ...DATA.filter(d => d.tr !== q.tr).map(d => d.tr)].slice(0, 4).sort(() => Math.random() - 0.5);
        
        const grid = document.getElementById('opt-grid'); grid.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = "opt"; b.innerText = o;
            b.onclick = () => {
                if(isBusy) return; isBusy = true;
                if(o === q.tr) {
                    b.classList.add('correct'); st.xp += 80; st.coins += 25; st.streak++;
                    showCombo(st.streak);
                    if(st.streak >= 5) { st.streak = 0; queue.push('gift'); }
                } else {
                    b.classList.add('wrong');
                    if(st.shields > 0) { st.shields--; alert("Kalkanın Seni Korudu!"); }
                    else { st.lives--; st.streak = 0; }
                    if(st.lives <= 0) { alert("Oyun Bitti!"); localStorage.removeItem('Akademy_Save_Final'); location.reload(); return; }
                }
                setTimeout(() => { upUI(); isBusy = false; if(queue.length > 0) processQueue(); else next(); }, 700);
            };
            grid.appendChild(b);
        });
    }

    function processQueue() {
        let a = queue.shift();
        if(a === 'levelup') {
            showResult("🎖️", "SEVİYE ATLADIN", `Tebrikler ${st.name}, artık Seviye ${st.level} oldun!`, () => { next(); });
        } else if(a === 'gift') {
            toggle('gift-lock', true);
        }
    }

    function showResult(ico, ttl, dsc, cb) {
        document.getElementById('res-ico').innerText = ico;
        document.getElementById('res-ttl').innerText = ttl;
        document.getElementById('res-dsc').innerText = dsc;
        document.getElementById('res-btn').onclick = () => { toggle('res-overlay', false); if(cb) cb(); };
        toggle('res-overlay', true);
        confetti();
    }

    function clickGift() {
        st.giftClicks++;
        document.getElementById('gift-emoji').style.transform = `scale(${1 + st.giftClicks*0.2})`;
        if(st.giftClicks >= 6) {
            st.giftClicks = 0; document.getElementById('gift-emoji').style.transform = "scale(1)";
            let r = REWARDS[Math.floor(Math.random()*REWARDS.length)]; r.fn();
            toggle('gift-lock', false);
            showResult(r.i, r.t, r.d, () => { next(); });
        }
    }

    function showCombo(c) {
        if(c < 2) return;
        const ct = document.getElementById('combo-text');
        ct.innerText = `KOMBO X${c}`;
        ct.classList.remove('combo-anim'); void ct.offsetWidth; ct.classList.add('combo-anim');
    }

    function openShop() {
        const list = document.getElementById('shop-list'); list.innerHTML = "";
        SHOP_ITEMS.forEach(it => {
            const lk = st.level < it.l;
            const div = document.createElement('div'); div.className = `file-item ${lk?'locked':''}`;
            div.innerHTML = `<div class="file-icon">${lk?'🔒':it.i}</div><div class="file-info"><b>${it.n}</b><span>${lk?'Seviye '+it.l:it.d}</span></div><div class="price-tag">${it.p}💰</div>`;
            if(!lk) div.onclick = () => {
                if(st.coins >= it.p) {
                    st.coins -= it.p;
                    if(it.id==='h1') st.lives++; if(it.id==='s1') st.shields++; if(it.id==='x1') st.xp+=1200;
                    upUI(); alert("Alındı!");
                } else alert("Para yetersiz!");
            };
            list.appendChild(div);
        });
        toggle('shop-overlay', true);
    }

    function toggle(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
</script>
</body>
</html>
