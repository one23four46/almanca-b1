<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeutschAcademy 1000+ Kelime Arşivi</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfaf5; --accent: #e65100; --accent2: #2e7d32; --dark: #1a1612; --border: #e0d8cc; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--dark); font-family:'Outfit',sans-serif; }
        
        header { background: white; border-bottom: 2px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .logo { font-family: 'Fraunces'; font-size: 1.5rem; color: var(--accent); cursor: pointer; text-decoration:none; font-weight:900; }
        
        .container { max-width: 500px; margin: 1.5rem auto; padding: 0 1rem; }
        .hidden { display: none !important; }

        /* GİRİŞ EKRANI */
        .welcome-box { text-align: center; padding: 2rem 0; animation: fadeIn 0.5s ease; }
        .lvl-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .lvl-row { background: white; border: 1px solid var(--border); padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; font-weight: 700; }
        .lvl-row:hover { transform: scale(1.02); border-color: var(--accent); }
        .count-tag { background: #eee; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; color: #666; }

        /* KELİME KARTI */
        .v-card { background: white; border-radius: 25px; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
        
        /* KÜÇÜK RESİM TASARIMI */
        .v-thumb { width: 120px; height: 120px; background: #f0f0f0; border-radius: 20px; margin: 0 auto 1rem; overflow: hidden; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .v-word { font-family: 'Fraunces'; font-size: 2.2rem; margin-bottom: 2px; line-height: 1; }
        .v-tr { font-size: 1.2rem; color: var(--accent2); font-weight: 600; margin-bottom: 1rem; }
        
        .v-details { display: flex; justify-content: center; gap: 10px; font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 1rem; }
        .v-details span { background: #f0f0f0; padding: 3px 10px; border-radius: 5px; }

        .v-example { background: #f9f6f2; padding: 1rem; border-radius: 15px; border-left: 4px solid var(--accent); text-align: left; cursor: pointer; margin-bottom: 1rem; }
        .v-example p { font-size: 0.95rem; font-weight: 600; color: #333; }

        .btn { background: var(--dark); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-weight: 700; width: 100%; font-size: 0.9rem; margin-bottom: 8px; transition: 0.2s; }
        .btn-next { background: var(--accent); }
        .progress { font-size: 0.75rem; color: #aaa; margin-bottom: 10px; font-weight: 600; }

        @keyframes fadeIn { from{opacity:0; transform: translateY(10px);} to{opacity:1; transform: translateY(0);} }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">DEUTSCH<em>1000</em></div>
    <div id="activeLvl" style="font-size: 0.8rem; font-weight: 800; color: #999;">SEVİYE SEÇİN</div>
</header>

<div class="container">
    
    <div id="screen-home" class="welcome-box">
        <h1 style="font-family:'Fraunces'; margin-bottom: 10px;">Kelime Hazneni Uçur</h1>
        <p style="color: #777; font-size: 0.9rem;">A1'den C1'e 1000+ kelimelik dev arşiv.</p>
        
        <div class="lvl-list">
            <div class="lvl-row" onclick="init('A1')">A1 - Başlangıç <span class="count-tag" id="cntA1">0 Kelime</span></div>
            <div class="lvl-row" onclick="init('A2')">A2 - Temel <span class="count-tag" id="cntA2">0 Kelime</span></div>
            <div class="lvl-row" onclick="init('B1')">B1 - Orta <span class="count-tag" id="cntB1">0 Kelime</span></div>
            <div class="lvl-row" onclick="init('B2')">B2 - İyi <span class="count-tag" id="cntB2">0 Kelime</span></div>
            <div class="lvl-row" onclick="init('C1')">C1 - İleri <span class="count-tag" id="cntC1">0 Kelime</span></div>
        </div>
    </div>

    <div id="screen-learning" class="hidden">
        <div class="progress" id="prog">1 / 100</div>
        <div class="v-card">
            <div class="v-thumb"><img id="vImg" src="" alt=""></div>
            
            <div class="v-details">
                <span id="vType">-</span>
                <span id="vPlural">-</span>
            </div>

            <h1 id="vWord">-</h1>
            <p id="vTr">-</p>
            
            <div class="v-example" onclick="speak(document.getElementById('vExDe').innerText)">
                <small style="color:var(--accent); font-weight:800; font-size:0.6rem;">CÜMLE İÇİNDE 🔊</small>
                <p id="vExDe" style="margin-top:3px;"></p>
                <p id="vExTr" style="font-size:0.8rem; color:#888; font-weight:400;"></p>
            </div>

            <button class="btn btn-next" onclick="next()">Sonraki →</button>
            <button class="btn" style="background:#eee; color:#666;" onclick="speak(document.getElementById('vWord').innerText)">🔊 Telaffuz</button>
            <button class="btn" style="background:none; color:#bbb; font-size:0.7rem;" onclick="location.reload()">Ana Menü</button>
        </div>
    </div>

</div>

// Sayacı Başlat
document.getElementById('cntA1').innerText = (data['A1'] || []).length + " Kelime";
document.getElementById('cntB1').innerText = (data['B1'] || []).length + " Kelime";

let active = [];
let cursor = 0;

function init(lvl) {
    if(!data[lvl] || data[lvl].length === 0) { alert("Bu seviye yakında eklenecek!"); return; }
    active = data[lvl];
    cursor = 0;
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-learning').classList.remove('hidden');
    document.getElementById('activeLvl').innerText = lvl + " KURSU";
    render();
}

function render() {
    const item = active[cursor];
    document.getElementById('prog').innerText = `${cursor + 1} / ${active.length}`;
    document.getElementById('vWord').innerText = item.w;
    document.getElementById('vTr').innerText = item.t;
    document.getElementById('vType').innerText = item.tp;
    document.getElementById('vPlural').innerText = item.p;
    document.getElementById('vExDe').innerText = item.exD;
    document.getElementById('vExTr').innerText = item.exT;
    document.getElementById('vImg').src = `https://loremflickr.com/200/200/${item.img},germany/all`;
    speak(item.w);
}

function next() {
    cursor = (cursor + 1) % active.length;
    render();
}

function speak(t) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'de-DE'; u.rate = 0.9;
    window.speechSynthesis.speak(u);
}
</script>

</html>
